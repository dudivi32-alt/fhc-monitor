<html lang="zh-TW"><head><meta charset="UTF-8">

<style>
:root{color-scheme:light}*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei","PingFang TC",sans-serif;margin:0;background:#f6f8fa;color:#1a1a1a;font-size:13px;line-height:1.5}
.wrap{max-width:1200px;margin:0 auto;padding:20px}

.obs-card{background:#fff;border-left:4px solid #0a3d62;border-radius:8px;padding:16px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}

/* tabs/panels */

.panel{display:none;background:#fff;padding:18px 22px;border-radius:0 0 8px 8px;box-shadow:0 2px 8px rgba(0,0,0,.04)}

<div class="foot"><b>資料來源</b>：{{SOURCE}}<br>
<b>欄位定義</b>：外資 含外資自營商；自營商＝自行買賣＋避險<br>
<b>顏色</b>：<span class="pos">紅＝買超／上漲</span>　<span class="neg">綠＝賣超／下跌</span></div>

<script>
const HISTORY = {{HISTORY_JSON}};
const DATA = {{DATA_JSON}};
const state = {};

function fmtSigned(n){ if(n==null||isNaN(n))return'—';const r=Math.round(n);if(r===0)return'0';return(r>0?'+':'')+r.toLocaleString('en-US'); }
function fmtSignedDec(n){ if(n==null||isNaN(n))return'—';if(Math.abs(n)<0.05)return'0';return(n>0?'+':'')+n.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1}); }
function fmtPrice(n){return n==null?'—':n.toFixed(2);}
function fmtPct(n){if(n==null||isNaN(n))return'—';return(n>0?'+':'')+n.toFixed(2)+'%';}
function fmtInt(n){return n==null?'—':Math.round(n).toLocaleString('en-US');}
function clsOf(n){if(n==null||isNaN(n)||n===0)return'neu';return n>0?'pos':'neg';}

function sortRows(rows,key,dir){
  const mul=dir==='asc'?1:-1;
  return [...rows].sort((a,b)=>{
    if(key==='code')return a.code.localeCompare(b.code)*mul;
    if(key==='name')return a.name.localeCompare(b.name)*mul;
    const va=a.m?a.m[key]:null, vb=b.m?b.m[key]:null;
    const ea=va==null||isNaN(va), eb=vb==null||isNaN(vb);
    if(ea&&eb)return 0; if(ea)return 1; if(eb)return -1;
    return (va-vb)*mul;
  });
}
function thHtml(label,key,st){
  const cls=st.sortKey===key?('sort-'+st.sortDir):'';
  return `<th class="${cls}" data-key="${key}">${label}<span class="sort-ind"></span></th>`;
}

function renderInst(period){
  const k=`inst_${period}`;
  if(!state[k])state[k]={mode:'lots',sortKey:'code',sortDir:'asc'};
  const st=state[k]; const isLots=st.mode==='lots';
  const cols=isLots?[
    ['股票','code'],['走勢(20日)','_spark'],['外資(張)','fL'],['投信(張)','tL'],['自營商(張)','dL'],['法人合計(張)','totL'],
    ['收盤價','close'],[period===1?'漲跌':period+'日漲跌','pct'],[period===1?'成交量(張)':period+'日成交量(張)','vol'],
  ]:[
    ['股票','code'],['走勢(20日)','_spark'],['外資(百萬)','fK'],['投信(百萬)','tK'],['自營商(百萬)','dK'],['法人合計(百萬)','totK'],
    ['收盤價','close'],[period===1?'漲跌':period+'日漲跌','pct'],[period===1?'成交量(張)':period+'日成交量(張)','vol'],
  ];
  const rows=DATA.all_results.map(r=>({code:r.code,name:r.name,m:r['p'+period]}));
  const sorted=sortRows(rows,st.sortKey,st.sortDir);
  const head='<thead><tr>'+cols.map(c=>thHtml(c[0],c[1],st)).join('')+'</tr></thead>';
  let body='<tbody>'; let sumF=0,sumT=0,sumD=0,sumAll=0;
  for(const r of sorted){
    const m=r.m;
    if(isLots){
      sumF+=m.fL;sumT+=m.tL;sumD+=m.dL;sumAll+=m.totL;
      body+=`<tr><td><span class="code">${r.code}</span>${r.name}</td>
        <td>${sparkSvg(r.code)}</td>
        <td class="${clsOf(m.fL)}">${fmtSigned(m.fL)}</td><td class="${clsOf(m.tL)}">${fmtSigned(m.tL)}</td>
        <td class="${clsOf(m.dL)}">${fmtSigned(m.dL)}</td><td class="${clsOf(m.totL)}"><b>${fmtSigned(m.totL)}</b></td>
        <td>${fmtPrice(m.close)}</td><td class="${clsOf(m.pct)}">${fmtPct(m.pct)}</td><td>${fmtInt(m.vol)}</td></tr>`;
    } else {
      sumF+=m.fK;sumT+=m.tK;sumD+=m.dK;sumAll+=m.totK;
      body+=`<tr><td><span class="code">${r.code}</span>${r.name}</td>
        <td>${sparkSvg(r.code)}</td>
        <td class="${clsOf(m.fK)}">${fmtSignedDec(m.fK)}</td><td class="${clsOf(m.tK)}">${fmtSignedDec(m.tK)}</td>
        <td class="${clsOf(m.dK)}">${fmtSignedDec(m.dK)}</td><td class="${clsOf(m.totK)}"><b>${fmtSignedDec(m.totK)}</b></td>
        <td>${fmtPrice(m.close)}</td><td class="${clsOf(m.pct)}">${fmtPct(m.pct)}</td><td>${fmtInt(m.vol)}</td></tr>`;
    }
  }
  const sf=isLots?fmtSigned:fmtSignedDec;
  body+=`<tr class="sum"><td>13家合計</td><td></td><td class="${clsOf(sumF)}">${sf(sumF)}</td><td class="${clsOf(sumT)}">${sf(sumT)}</td><td class="${clsOf(sumD)}">${sf(sumD)}</td><td class="${clsOf(sumAll)}">${sf(sumAll)}</td><td colspan="3"></td></tr></tbody>`;
  document.getElementById('inst'+period).innerHTML=head+body;
  document.querySelectorAll('#inst'+period+' th').forEach(th=>{
    th.onclick=()=>{const kk=th.dataset.key;if(st.sortKey===kk)st.sortDir=st.sortDir==='asc'?'desc':'asc';else{st.sortKey=kk;st.sortDir='asc';}renderInst(period);};
  });
}



// ── Sparkline ──
function sparkSvg(code, n=20){
  const h = HISTORY[code];
  if(!h) return '<svg width="60" height="24"></svg>';
  const days = h.days.slice(-n);
  if(days.length<2) return '<svg width="60" height="24"></svg>';
  const prices = days.map(d=>d[1]);
  const mn=Math.min(...prices), mx=Math.max(...prices), rng=mx-mn||1;
  const W=60,H=24;
  const pts=prices.map((p,i)=>`${(i/(prices.length-1)*W).toFixed(1)},${(H-(p-mn)/rng*H).toFixed(1)}`).join(' ');
  const col=prices[prices.length-1]>=prices[0]?'#c0392b':'#27713a';
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5"/></svg>`;
}

// ── 圖表 ──
let _chartCode='2880';
let _ci={};

function selectStock(code){
  _chartCode=code;
  document.querySelectorAll('.stock-btn').forEach(b=>b.classList.toggle('active',b.dataset.code===code));
  applyRange();
}

function setRange(range){
  const ed=new Date(), sd=new Date();
  if(range==='1M') sd.setMonth(sd.getMonth()-1);
  else if(range==='3M') sd.setMonth(sd.getMonth()-3);
  else if(range==='6M') sd.setMonth(sd.getMonth()-6);
  else if(range==='YTD'){sd.setMonth(0);sd.setDate(1);}
  else if(range==='1Y') sd.setFullYear(sd.getFullYear()-1);
  else {sd.setFullYear(2021);sd.setMonth(0);sd.setDate(1);}
  document.getElementById('dateStart').value=sd.toISOString().slice(0,10);
  document.getElementById('dateEnd').value=ed.toISOString().slice(0,10);
  document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
  const map={'1M':0,'3M':1,'6M':2,'YTD':3,'1Y':4,'ALL':5};
  const btns=document.querySelectorAll('.range-btn');
  if(range in map) btns[map[range]].classList.add('active');
  applyRange();
}

function applyRange(){
  const s=document.getElementById('dateStart').value.replace(/-/g,'');
  const e=document.getElementById('dateEnd').value.replace(/-/g,'');
  renderStockChart(_chartCode,s,e);
}

function renderStockChart(code,startD,endD){
  const h=HISTORY[code]; if(!h) return;
  const days=h.days.filter(d=>d[0]>=startD&&d[0]<=endD);
  if(!days.length) return;
  const labels=days.map(d=>days.length>250?`${d[0].slice(0,4)}/${d[0].slice(4,6)}`:`${d[0].slice(4,6)}/${d[0].slice(6,8)}`);
  const prices=days.map(d=>d[1]);
  const vols=days.map(d=>d[2]);
  const fL=days.map(d=>d[3]||0);
  const tL=days.map(d=>d[4]||0);
  const dL=days.map(d=>d[5]||0);
  const tot=days.map(d=>d[6]||0);

  // KPI
  const first=prices[0],last=prices[prices.length-1];
  const chgPct=((last-first)/first*100).toFixed(2);
  const cumF=fL.reduce((a,b)=>a+b,0);
  const cumTot=tot.reduce((a,b)=>a+b,0);
  const fHoldLatest=(()=>{const r=DATA.all_results.find(x=>x.code===code);return r&&r.p1?r.p1.fHold:null;})();
  const col=last>=first?'#c0392b':'#27713a';
  document.getElementById('chartKpi').innerHTML=
    `<div class="kpi-item"><b style="color:${col}">${last.toFixed(2)}</b>最新收盤</div>`+
    `<div class="kpi-item"><b style="color:${col}">${chgPct>0?'+':''}${chgPct}%</b>區間漲跌</div>`+
    (fHoldLatest!=null?`<div class="kpi-item"><b>${fHoldLatest}%</b>外資持股</div>`:'') +
    `<div class="kpi-item"><b style="color:${cumF>=0?'#c0392b':'#27713a'}">${cumF>=0?'+':''}${cumF.toLocaleString()}</b>外資累計(張)</div>`+
    `<div class="kpi-item"><b style="color:${cumTot>=0?'#c0392b':'#27713a'}">${cumTot>=0?'+':''}${cumTot.toLocaleString()}</b>法人合計(張)</div>`;
  document.getElementById('chartPriceTitle').textContent=`${h.name}（${code}）收盤價`;

  const maxTk=Math.max(...labels.length>60?Array.from({length:8},(_,i)=>Math.round(i*labels.length/7)):labels.map((_,i)=>i));
  const commonX={ticks:{maxTicksLimit:labels.length>120?8:labels.length>60?10:14,font:{size:10}},grid:{display:false}};

  if(_ci.p) _ci.p.destroy();
  _ci.p=new Chart(document.getElementById('priceChart'),{
    type:'line',
    data:{labels,datasets:[{data:prices,borderColor:col,fill:false,pointRadius:0,borderWidth:1.5,tension:0.1}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y.toFixed(2)}`}}},
      scales:{x:commonX,y:{ticks:{font:{size:10}},grid:{color:'#f0f0f0'}}}}
  });

  if(_ci.v) _ci.v.destroy();
  _ci.v=new Chart(document.getElementById('volChart'),{
    type:'bar',
    data:{labels,datasets:[{data:vols,backgroundColor:'rgba(100,149,200,0.5)',borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y.toLocaleString()} 張`}}},
      scales:{x:commonX,y:{ticks:{font:{size:10}},grid:{color:'#f0f0f0'}}}}
  });

  // 持股比例（外資/投信/自營商/合計）— 沿用同一區間；hover 任一日期顯示四者數值
  const fH=days.map(d=>d[7]??null);
  const tH=days.map(d=>d[8]??null);
  const dH=days.map(d=>d[9]??null);
  const totH=days.map(d=>d[10]??null);
  const holdReadout=document.getElementById('holdReadout');
  const fmtH=v=>v==null?'—':v.toFixed(2)+'%';
  const allDays=h.days, lastT=[...allDays].reverse().find(d=>d[8]!=null);
  const holdNote=(lastT&&lastT[0]<allDays[allDays.length-1][0])
    ?`（投信/自營商/合計更新至 ${lastT[0].slice(0,4)}/${lastT[0].slice(4,6)}/${lastT[0].slice(6,8)}）`:'';
  const setReadout=i=>{holdReadout.textContent=
    `${days[i][0].slice(0,4)}/${days[i][0].slice(4,6)}/${days[i][0].slice(6,8)}｜外資 ${fmtH(fH[i])}．投信 ${fmtH(tH[i])}．自營商 ${fmtH(dH[i])}．合計 ${fmtH(totH[i])}${holdNote}`;};
  setReadout(days.length-1);
  if(_ci.h) _ci.h.destroy();
  _ci.h=new Chart(document.getElementById('holdChart'),{
    type:'line',
    data:{labels,datasets:[
      {label:'外資',data:fH,borderColor:'#1e5f8e',backgroundColor:'#1e5f8e',pointRadius:0,borderWidth:1.6,tension:0.1,spanGaps:true},
      {label:'投信',data:tH,borderColor:'#e67e22',backgroundColor:'#e67e22',pointRadius:0,borderWidth:1.6,tension:0.1,spanGaps:true},
      {label:'自營商',data:dH,borderColor:'#8e44ad',backgroundColor:'#8e44ad',pointRadius:0,borderWidth:1.6,tension:0.1,spanGaps:true},
      {label:'三大法人合計',data:totH,borderColor:'#2c3e50',backgroundColor:'#2c3e50',pointRadius:0,borderWidth:2.2,tension:0.1,spanGaps:true},
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:'index',intersect:false},
      onHover:(e,els,chart)=>{const pts=chart.getElementsAtEventForMode(e,'index',{intersect:false},true);if(pts.length)setReadout(pts[0].index);},
      plugins:{legend:{labels:{font:{size:10},boxWidth:10}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y==null?'—':c.parsed.y.toFixed(2)+'%'}`}}},
      scales:{x:commonX,y:{ticks:{font:{size:10},callback:v=>v+'%'},grid:{color:'#f0f0f0'}}}}
  });

  if(_ci.i) _ci.i.destroy();
  _ci.i=new Chart(document.getElementById('instChart'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'外資',data:fL,backgroundColor:fL.map(v=>v>=0?'rgba(192,57,43,0.7)':'rgba(39,113,58,0.7)'),borderWidth:0},
      {label:'投信',data:tL,backgroundColor:tL.map(v=>v>=0?'rgba(192,57,43,0.4)':'rgba(39,113,58,0.4)'),borderWidth:0},
      {label:'自營',data:dL,backgroundColor:'rgba(150,150,150,0.4)',borderWidth:0},
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{labels:{font:{size:10},boxWidth:10}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y>=0?'+':''}${c.parsed.y.toLocaleString()} 張`}}},
      scales:{x:{...commonX,stacked:true},y:{stacked:true,ticks:{font:{size:10}},grid:{color:'#f0f0f0'}}}}
  });
}

function renderIdx(){
  if(!DATA.indexHistory||DATA.indexHistory.length<2){document.getElementById("idxBody").innerHTML="<tr><td colspan=5 style=color:#999>指數資料更新中...</td></tr>";return;}
  function idxM(key,n){const last=DATA.indexHistory[DATA.indexHistory.length-1];if(DATA.indexHistory.length<=n)return null;const prev=DATA.indexHistory[DATA.indexHistory.length-1-n];return{val:last[key],chg:last[key]-prev[key],pct:(last[key]-prev[key])/prev[key]*100};}
  function cell(m){if(!m)return'<td>—</td>';const c=clsOf(m.pct),s=m.pct>0?'+':'';return`<td><div class="chg ${c}">${s}${m.chg.toFixed(2)}　(${s}${m.pct.toFixed(2)}%)</div></td>`;}
  const t1=idxM('taiex',1),t3=idxM('taiex',3),t5=idxM('taiex',5);
  const f1=idxM('fin',1),f3=idxM('fin',3),f5=idxM('fin',5);
  document.getElementById('idxBody').innerHTML=`
    <tr><td>加權指數</td><td><span class="val">${t1.val.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></td>${cell(t1)}${cell(t3)}${cell(t5)}</tr>
    <tr><td>金融保險類指數</td><td><span class="val">${f1.val.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></td>${cell(f1)}${cell(f3)}${cell(f5)}</tr>`;
}

function switchTab(n){['1','3','5','chart'].forEach(x=>{document.getElementById('p'+x).classList.toggle('active',String(x)==String(n));document.getElementById('t'+x).classList.toggle('active',String(x)==String(n));});if(n==='chart'&&!window._chartReady){window._chartReady=true;requestAnimationFrame(()=>setRange('1Y'));}}
function setMode(n,m){state['inst_'+n].mode=m;document.getElementById('m'+n+'l').classList.toggle('active',m==='lots');document.getElementById('m'+n+'a').classList.toggle('active',m==='amount');renderInst(n);}

renderIdx();
[1,3,5].forEach(n=>{renderInst(n);});
